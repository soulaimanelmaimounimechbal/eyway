kind = "web"
previewPath = "/"
title = "Social Styles Training"
version = "1.0.0"
id = "artifacts/training"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20298

[services.development]
run = "pnpm --filter @workspace/training run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/training", "run", "build" ]
publicDir = "artifacts/training/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20298"
BASE_PATH = "/"
