# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
#
# This project is a pnpm monorepo. `npm install` is intentionally blocked by a
# preinstall guard, so this workflow uses pnpm. It builds the backend (API +
# voice proxy) and the frontend (training UI), assembles a single self-contained
# package, and deploys it to one Azure Web App that serves both.

name: Build and deploy Node.js app to Azure Web App - ey-way

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write # required for Azure OIDC login
  contents: read # required for actions/checkout

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build backend (API + voice proxy)
        run: pnpm --filter @workspace/api-server run build

      - name: Build frontend (training UI)
        env:
          BASE_PATH: /
          PORT: "8080"
        run: pnpm --filter @workspace/training run build

      - name: Assemble self-contained deploy package
        run: |
          rm -rf deploy
          # Produces ./deploy with the built server bundle + a flat node_modules
          # containing the runtime deps that aren't bundled (e.g. @azure/*).
          # node-linker=hoisted is REQUIRED: pnpm's default symlinked layout does
          # not survive Azure's zip deploy, so externalized packages like
          # @azure/ai-voicelive would fail at runtime (ERR_MODULE_NOT_FOUND).
          pnpm --filter @workspace/api-server --prod --legacy --node-linker=hoisted deploy deploy
          # Co-locate the built frontend so the server serves it from /public.
          cp -r artifacts/training/dist/public deploy/public

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_3E8BFBFB4D054846A49EEB19F57F1769 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_10445CFA92ED4C3294F328A6ECBCCE78 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C05EDF0E0761486FAD93E3CCCA21AE4E }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "ey-way"
          slot-name: "Production"
          package: deploy
          startup-command: "node dist/index.mjs"
